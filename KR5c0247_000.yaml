front:
  text: 修真袐録
  hash: sha256:3b259f6a03da169a18fe1ae86fd52f17eb2226514b2164825941bb3706313248
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0247_HFL_000-001a, image: hfl/0573/0573-178.png}
body:
  text: 前商州豐陽縣主薄符度仁纂食宜篇思仙問曰夫修養之士何物所宜食之充飢得不傷損矣真人曰酸鹹甘苦食之各歸某時春夏秋冬順之勿逆其藏所食大過成疾亦深節戒作方延益無限其傷損之事前巳具言延益之宜今鳥子説無令脫略子宜志之八素云春宜食辛辛能散也夏宜食鹹鹹能潤也長夏宜食酸酸能收也秋宜食苦昔能堅也冬宜食甘肥甘能緩中而長肌肉肥能密理而補中皆益五藏而散邪氣矣此四時之味隨所宜加之食皆能益藏而除於邪養生之道可不移矣禮記內則云凡和春多酸夏多苦秋多辛冬多鹹調以滑甘注云多其時味以養其氣也經曰春無食酸夏無食苦四時各減時味者謂氣壯也減其時味以殺盛氣內則所云多其時味恐氣虛贏故多其時味以養其氣也內則云春宜羔豚膳膏薌春為木王膏薌牛膏也牛中央土畜木尅土木盛則土休廢用休廢之膏以節其氣故用午膏薌也夏冝腒鱐所切留膳膏臊腒乾雉也彌乾魚也臊犬膏也大屬西方金也夏屬南方火火金火盛則金休廢故用犬膏臊以莭氣也尅秋宜犢麢膳膏腥膏腥雞也雞屬東方木秋屬西方金金尅木金盛則木休廢故用雞膏腥也冬冝鮮羽膳膏羶膏隨羊也羊屬南方火冬屬北方水水尅火水盛則火休廢故用休廢膏禮也鄭云彼羔豚物生而肥犢麛物盛而充腒鱐膜呼旱切熱而乾魚鴈水涸而性定此八物得四時之氣尤為人食之不勝是以用休廢之脂膏煎和善之也凡牛宜稌羊宜黍豕宜稷犬宜梁魚宜瓜言其氣味相成也周禮天官云凡食齊視音視春時飯宜溫也羮齋視夏時羮宜熱也醬齊視秋時醬宜涼也飮齊視冬時飲直寒也太素云肝色青宜食甘粳米飯牛肉棗皆甘心色赤直食酸麻大肉李皆酸脾色黃宜食鹹大豆豬肉栗皆鹹肺色白宜食苦麥羊肉杏皆苦腎色黑宜食辛黃黍雞肉桃皆辛又肝病者宜食麻麥犬肉李韭心病者宜食麥羊肉杏薤脾病者宜食粳米牛肉棗葵肺病者宜食黃黍雞肉桃蔥腎病者宜食大豆黃黍豬肉栗藿是故謹和五味則骨正筋柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命羊肉大熱羊頭肉平主風眩疫疾羊肚主補胃虛損小便數止虛汗羊乳酪補肺利大腸羊腎補虛脂益髓犬肉溫主補五臟勞傷久服益氣力厚腸胃實下焦填骨髓不可炙食牛肉平牛乳甘寒主補虛羸止渴牛酪主寒熱止渴除胸中熱牛酥寒淘胸其客氣利大小暘鹿頭肉主消渴及多夢鹿肉主補中益氣力鹿蹄肉主骨髓中疼痛鹿夂食令人耐寒麝肉補五臟從八月至十一月食勝羊肉驢肉主風狂憂愁不樂能安心氣貒肉主攴水脹垂死作羹膏之大效豹肉溫酸主強筋骨志性蝟肉平食之肥下焦強胃氣能食雄雞肉酸溫主下氣去狂邪安五臟腸中消渴鳥雄雞肉甘溫主補中止痛除心腹惡氣鳥雌雞肉味平甘主隂風寒濕痺五緩六急安胎及乳癰鴈肉味甘平主益氣輕身久服長髮耐老不飢白鴨肉平主補虛羸消毒熱和藏府利水道黑鴨不可食野鴨肉味鹹寒主補中益氣和藏府除客熱消食九月後好食消腹中蟲平胃氣調中輕身可長食之勝家鴨鶉溫補五藏益中續氣實筋骨耐寒暑消結實長食令人不厭四月巳後八月巳前不中食乾棗味甘辛溫主心服邪氣安中養脾氣助十二經脈通九竅補少津液大驚強志久服輕身延年不飢成仙栗味鹹溫主益氣厚腸胃補腎令人耐飢生食治腰腳不宜蒸食柿味甘寒補虛勞不足乾者厚腸胃健脾氣消宿血紅柿至補肺氣續經絡氣橘子味酸寒主下氣開胸膈痰疾結氣止渴久服除口臭輕身長年皮陳久者良烏梅味苦平主下氣除煩熱安心神支體疼痛偏枯不仁止下痢好睡口乾桍寒益心氣補中焦不足櫻桃平主調中益脾氣多食無損令人好顏色美志性蒲桃味甘平主益氣倍力強志耐飢寒去腸間水調中久服之輕身延年林檎溫主止消渴好睡不可多食覆盆子味甘平主益氣輕身令人髮不白甘蔗味甘平主益氣補脾氣利大腸止渴豆蔻味辛溫主溫中止嘔吐口臭蓮子寒主五藏不足傷中氣絶利益十二經脈二十五絡益血氣食之心歡止渴去熱補中養神除百病久服輕身耐老延年耦寒主補中益氣力養精神除目病久服輕身耐老不飢延年雞頭實主補中愈百病益子精強志明目菱實平主安中補藏令人不飢芋平主寬緩腹胃除死肌令人恱澤椹寒主補五臟明耳日利關節通血脈益精神久食不飢變白髮枸杞味苦寒主五內邪氣熱中消胸脅氣除客熱風痺堅筋骨強隂利大小腸補虛損明目益精氣久服輕身耐寒暑葵味甘寒宜脾久食利骨氣為百菜主竹筍味甘寒主消渴利水道益氣力不可久食苜蓿味苦寒利五藏輕身去脾胃邪氣諸熱毒不可久食瘦人薺味甘溫主利肝藏和中明目服丹石人不可多食蔓菁味苦溫主消食下氣利五藏輕身益氣蘿蔔寒利五藏輕身益氣根消食下氣除五藏中風鍊五藏中惡氣服之令人白淨細肌理美顔色制麵毒白苣味苦寒主補筋力利五藏通經脈令人齒白聰明少睡蔥白味辛溫平冬月食之甚益人不可多食虛人蔥青葉溫歸肉除肝邪安中利五藏益目精殺百藥毒薤味苦辛宜心歸骨除寒熱去水氣溫中散結氣輕身耐老學道人長服之通神安魂益氣力續筋骨韭味辛酸溫歸心宜肝可久食安五藏不利病人荏子味辛主咳逆下氣溫中補髓葉調中却臭氣紫蘇下氣除寒中薄苛味苦平却腎氣解勞乏新病人不宜食荆芥味苦溫辟邪氣除勞不宜久食蘭香溫主消食去停水散毒氣苘篙味辛平主安心氣養脾胃消飮食不可頻食香薷味辛溫散水腫止霍亂去熱風不可多食苦菜味苦寒主五藏邪氣久服安心益氣少卧輕身不老耐飢藍菜平主填骨髓利五藏調六府理經絡結氣眀耳目使人骨健少睡益心力久食大益人生薑溫去痰下氣去胸中臭氣通神眀散煩悶開胃口水芹寒養神益力令人肥健殺百藥毒白髙今青篙也味辛主補中益氣養五藏長毛髮令黑久服輕身不老小葪根味甘溫主養精保氣令人肥澤野豆寒久食輕身少睡調十二經脈利五藏宮熱氣長食甚益人烏芹溫主心腹滿下氣消食能調味甘香美泱明平主明目輕身利五藏牛蒡寒主去熱風頭面煩滿四支不遂通十二經脈久服輕身菠薐寒主利五藏通腸胃服丹石人食之甚良朱莙達平主補中下氣利五藏白黍米味甘辛溫宜肺主補中益氣粳米味甘辛苦主心煩止渴益氣斷下利平胃氣長肌肉食粳米主補中益氣堅筋骨通血脈炊飯水浸令酸食之緩五藏六府氣白梁米味甘寒除胸中客熱移易五藏六府續筋骨可長食之粟米味鹹寒主養腎氣去骨痺熱中益氣力陳者止利壓丹石毒胡麻味甘主益力氣長肌肉填骨髓堅筋骨治金瘡止痛久服輕身長年緑豆味甘酸主虛羸補五內虛乏益氣安精神行十二經脈食之脾厚肚寬可長食之大麥味鹹寒宜心主消渴除煩熱益氣調中久食頭不白穬麥味甘寒主輕身除藝久食令人多力健行五榖之中穬麥為上小麥味甘寒主養肝氣去寒熱止渴煩補中益氣和五藏調經絡薏茨仁味甘溫主筋急拘攣久風濕痺下氣久服輕身益氣除筋骨中邪氣利腸胃消水腫令人能食稗米味甘平主益氣補中利脾胃氣白豆平補五藏益中助十二經脈可長食之飴糖味甘溫主補虛乏益心力止渴治喉咽痛除唾血月宜篇思仙問曰嘗聞月宿所宜食者願暘其法真人曰每月宿下各有所宜之物人若擇而食之亦可除其疾疹矣今傳於子亦可曉示將來養生論云正月卯日食鮦魚使人無瘟病二月春分食龜使人不蛔子孫蕃息三月宿畢食鮪魚使人不隨美色多氣力送迎各二日春三月食大肉又先酸麥無齒病因甲乙以具四月宿昂食雞使人目眀五月夏至食鳴鵙送迎各二日食鴟梟送迎十日六月宿房食野雉使人陽多遂子孫矣夏三月食雞雉及苦先麥食之無疸病因丙丁以具七月食蠹使人宜子孫送迎各二日蠧木蝎也八月秋分食蠹使人無病淫衆人畏之送迎二日九月宿建星食鴈使人不病疸得良辰美筋骨送迎二日秋三月食馬肉及辛食之無寒病因庚辛以具十月宿營室食諸鳥使人爍心益夀美色送迎二日十一月冬至食兔令人不蛔利足不僵十二月臘夜令人持椒卧井傍無與人言內椒井中除瘟病冬三月食彘及鹹食之無足病因壬癸以具常以其月不盡三月夕半食者無飽修真祕録
